name: 🚀 Deploy AcadPack to cPanel

on:
    push:
        branches: [main]

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest

        steps:
            - name: 🚚 Checkout code
              uses: actions/checkout@v4

            - name: 🏗 Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: 📦 Install dependencies
              run: npm ci

            - name: 🛠 Build Next.js
              run: npm run build

            - name: 🧹 Prepare Files for FTP
              run: |
                  # 1. Create a clean deployment folder
                  mkdir deploy_me

                  # 2. Copy standalone server and node_modules into it
                  cp -r .next/standalone/. ./deploy_me/

                  # 3. Copy static assets into the internal structure Next.js expects
                  mkdir -p ./deploy_me/.next/static
                  cp -r .next/static/. ./deploy_me/.next/static/
                  cp -r public/. ./deploy_me/public/

            - name: 📂 Sync to cPanel via FTP
              uses: SamKirkland/FTP-Deploy-Action@v4.3.5
              with:
                  server: ${{ secrets.FTP_SERVER }}
                  username: ${{ secrets.FTP_USERNAME }}
                  password: ${{ secrets.FTP_PASSWORD }}
                  protocol: ftps
                  port: 21
                  security: loose
                  # This ensures we only upload the production-ready files
                  local-dir: ./deploy_me/
                  server-dir: ./
